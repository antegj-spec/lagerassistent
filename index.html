<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lagerassistent</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>(function(){
    // Fas 5.12: följ OS-tema via prefers-color-scheme när användaren
    // inte aktivt valt. Manuell toggle (toggleTheme) sparar i localStorage
    // och tar då över. Reagera på OS-byten i realtid om ingen override.
    var apply = function(t){ document.documentElement.setAttribute('data-theme', t); };
    var saved = localStorage.getItem('lager-theme');
    var mq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    apply(saved || (mq && mq.matches ? 'dark' : 'light'));
    if (mq && mq.addEventListener) {
      mq.addEventListener('change', function(e){
        if (!localStorage.getItem('lager-theme')) apply(e.matches ? 'dark' : 'light');
      });
    }
  })();</script>
</head>
<body>
<div id="app">

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <img src="/assets/logo.png" class="pin-logo-img" alt="Logo">
    <div class="pin-field-group">
      <div class="pin-field-label">ANVÄNDARNAMN</div>
      <input type="text" id="username-input" class="pin-username-input" placeholder="Ditt namn" autocomplete="off" autocapitalize="words" list="username-list">
      <datalist id="username-list"></datalist>
    </div>
    <div class="pin-field-group">
      <div class="pin-field-label">PIN-KOD</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-btn-empty"></button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>

  <!-- FIRST LOGIN: SET OWN PIN -->
  <div id="first-pin-screen" style="display:none">
    <img src="/assets/logo.png" class="pin-logo-img" alt="Logo">
    <div class="pin-sub">VÄLJ DIN PIN-KOD</div>
    <div class="first-pin-title" id="first-pin-name"></div>
    <div class="first-pin-sub">Det är första gången du loggar in.<br>Välj en egen PIN-kod (4 siffror).</div>
    <div class="lbl" style="text-align:center;margin-bottom:6px" id="first-pin-step-lbl">NY PIN</div>
    <div class="pin-dots" id="first-pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid" style="margin-bottom:10px">
      <button class="pin-btn" onclick="firstPinPress('1')">1</button>
      <button class="pin-btn" onclick="firstPinPress('2')">2</button>
      <button class="pin-btn" onclick="firstPinPress('3')">3</button>
      <button class="pin-btn" onclick="firstPinPress('4')">4</button>
      <button class="pin-btn" onclick="firstPinPress('5')">5</button>
      <button class="pin-btn" onclick="firstPinPress('6')">6</button>
      <button class="pin-btn" onclick="firstPinPress('7')">7</button>
      <button class="pin-btn" onclick="firstPinPress('8')">8</button>
      <button class="pin-btn" onclick="firstPinPress('9')">9</button>
      <button class="pin-btn"></button>
      <button class="pin-btn" onclick="firstPinPress('0')">0</button>
      <button class="pin-btn del" onclick="firstPinDel()">⌫</button>
    </div>
    <div class="pin-error" id="first-pin-error"></div>
  </div>

  <!-- HEADER -->
  <header id="main-header" style="display:none">
    <div class="hdr-top">
      <img src="/assets/logo.png" class="hdr-logo-img" alt="Logo">
      <div class="hdr-meta" id="header-meta">Laddar...</div>
      <div class="hdr-right">
        <b class="hdr-username" id="user-display">—</b>
        <div class="hdr-gear-wrap">
          <button class="hdr-gear-btn" onclick="toggleGearMenu(event)" aria-label="Inställningar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
          <div class="hdr-gear-menu" id="hdr-gear-menu">
            <button class="hdr-gear-item" onclick="toggleTheme();closeGearMenu()">🌙 Växla tema</button>
            <button class="hdr-gear-item" id="hdr-gear-push-btn" onclick="togglePush();closeGearMenu()">🔔 Aktivera notiser</button>
            <button class="hdr-gear-item" onclick="openChangePin();closeGearMenu()">🔑 Byt PIN</button>
            <button class="hdr-gear-item hdr-gear-item--danger" onclick="logout()">🚪 Logga ut</button>
          </div>
        </div>
      </div>
    </div>
    <div id="header-deadline-warn"></div>
  </header>

  <!-- NAV (Fas 7: 5 main-grupper, sub-tabs renderas inuti varje vy) -->
  <nav id="main-nav" style="display:none">
    <button class="active" data-main-tab="hem" onclick="setMainTab('hem')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Hem</span>
    </button>
    <button data-main-tab="arbete" onclick="setMainTab('arbete')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span class="nav-label">Arbete</span>
    </button>
    <button data-main-tab="lager" onclick="setMainTab('lager')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      <span class="nav-label">Lager</span>
    </button>
    <button data-main-tab="drift" onclick="setMainTab('drift')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3" stroke-linecap="round"/></svg>
      <span class="nav-label">Drift</span>
    </button>
    <button id="admin-btn" data-main-tab="admin" style="display:none" onclick="setMainTab('admin')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nav-label">Admin</span>
    </button>
  </nav>

  <main id="main" style="display:none"></main>

</div>

<div id="toast"></div>
<div id="modal-container"></div>

<!-- Vite entrypoint (Fas 2.1: bara CSS-pipeline). I Fas 2.3 flyttas
     legacy-filerna nedan in i src/ och blir riktiga ES modules. -->

<script>
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('lager-theme', next);
}
</script>
</body>
</html>
