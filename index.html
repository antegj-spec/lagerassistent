<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lagerassistent</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('lager-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <img src="assets/logo.png" class="pin-logo-img" alt="Logo">
    <div class="pin-field-group">
      <div class="pin-field-label">ANVÄNDARNAMN</div>
      <input type="text" id="username-input" class="pin-username-input" placeholder="Ditt namn" autocomplete="off" autocapitalize="words" list="username-list">
      <datalist id="username-list"></datalist>
    </div>
    <div class="pin-field-group">
      <div class="pin-field-label">PIN-KOD</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-btn-empty"></button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>

  <!-- FIRST LOGIN: SET OWN PIN -->
  <div id="first-pin-screen" style="display:none">
    <img src="assets/logo.png" class="pin-logo-img" alt="Logo">
    <div class="pin-sub">VÄLJ DIN PIN-KOD</div>
    <div class="first-pin-title" id="first-pin-name"></div>
    <div class="first-pin-sub">Det är första gången du loggar in.<br>Välj en egen PIN-kod (4 siffror).</div>
    <div class="lbl" style="text-align:center;margin-bottom:6px" id="first-pin-step-lbl">NY PIN</div>
    <div class="pin-dots" id="first-pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid" style="margin-bottom:10px">
      <button class="pin-btn" onclick="firstPinPress('1')">1</button>
      <button class="pin-btn" onclick="firstPinPress('2')">2</button>
      <button class="pin-btn" onclick="firstPinPress('3')">3</button>
      <button class="pin-btn" onclick="firstPinPress('4')">4</button>
      <button class="pin-btn" onclick="firstPinPress('5')">5</button>
      <button class="pin-btn" onclick="firstPinPress('6')">6</button>
      <button class="pin-btn" onclick="firstPinPress('7')">7</button>
      <button class="pin-btn" onclick="firstPinPress('8')">8</button>
      <button class="pin-btn" onclick="firstPinPress('9')">9</button>
      <button class="pin-btn"></button>
      <button class="pin-btn" onclick="firstPinPress('0')">0</button>
      <button class="pin-btn del" onclick="firstPinDel()">⌫</button>
    </div>
    <div class="pin-error" id="first-pin-error"></div>
  </div>

  <!-- HEADER -->
  <header id="main-header" style="display:none">
    <div class="hdr-top">
      <div>
        <img src="assets/logo.png" class="hdr-logo-img" alt="Logo">
      </div>
      <div class="hdr-user">
        Inloggad som<br><b id="user-display">—</b>
        <div class="hdr-links">
          <span class="hdr-link" onclick="openChangePin()">Byt PIN</span>
          <span class="hdr-link" onclick="logout()">Logga ut</span>
        </div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Växla tema" aria-label="Växla tema"></button>
    </div>
    <div class="hdr-meta" id="header-meta">Laddar...</div>
    <div id="header-deadline-warn"></div>
  </header>

  <!-- NAV -->
  <nav id="main-nav" style="display:none">
    <button class="active" onclick="showTab('hem')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Hem</span>
    </button>
    <button onclick="showTab('anteckningar')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span class="nav-label">Noter</span>
    </button>
    <button onclick="showTab('material')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      <span class="nav-label">Material</span>
    </button>
    <button onclick="showTab('plan')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
      <span class="nav-label">Plan</span>
    </button>
    <button onclick="showTab('info')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3" stroke-linecap="round"/></svg>
      <span class="nav-label">Info</span>
    </button>
    <button id="ai-btn" style="display:none" onclick="showTab('chat')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="nav-label">AI</span>
    </button>
    <button id="export-btn" style="display:none" onclick="showTab('export')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span class="nav-label">Export</span>
    </button>
    <button id="trash-btn" style="display:none" onclick="showTab('trash')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      <span class="nav-label">Papper</span>
    </button>
  </nav>

  <main id="main" style="display:none"></main>

</div>

<div id="toast"></div>
<div id="modal-container"></div>

<!-- JavaScript — laddas i rätt ordning -->
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/render.js"></script>
<script src="js/actions.js"></script>
<script>
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('lager-theme', next);
}
</script>
</body>
</html>
