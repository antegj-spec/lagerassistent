[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Vite 8 kraver Node 20.19+ eller 22.12+. Pinnad till 22 (LTS).
  NODE_VERSION = "22"

  # SUPABASE_ANON_KEY och SUPABASE_URL är MEDVETET publika.
  # Anon-key:s syfte är att vara öppen — RLS skyddar data server-side (Fas 1).
  # SUPABASE_SERVICE_ROLE_KEY och CRON_SECRET fortsätter scannas (de är hemliga).
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,SUPABASE_URL"

# Automatiskt veckomail är avstängt.
# Sammanfattningen skickas manuellt av admin via knappen i Export-tabben
# (→ /.netlify/functions/send-weekly, kräver admin-JWT).
#
# Om automatik ska återinföras: avkommentera blocket nedan, lägg tillbaka
# x-cron-secret + CRON_SECRET-kontrollen i send-weekly.js, och skicka
# x-cron-secret-header via en GitHub Action eller Supabase pg_cron
# (Netlify scheduled-functions kan inte sätta egna headers).
#
# [[scheduled-functions]]
#   name = "send-weekly"
#   cron = "0 7 * * 1"


# ============================================================
# Säkerhetsheaders (M2). Gäller alla svar.
#
# CSP skickas som Report-Only först — appen är full av inline onclick/style +
# en inline <script> (tema) + Google Fonts, så en enforced CSP kräver
# 'unsafe-inline'. Report-Only bryter INGET men loggar violations i
# webbläsarkonsolen. Validera på en deploy-preview, byt sedan nyckeln
# "Content-Security-Policy-Report-Only" → "Content-Security-Policy" för att
# tvinga den. X-Frame-Options ger clickjacking-skydd direkt oavsett.
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(self), microphone=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://tzidalknfoumoknhsetx.supabase.co; connect-src 'self' https://tzidalknfoumoknhsetx.supabase.co wss://tzidalknfoumoknhsetx.supabase.co; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'"
