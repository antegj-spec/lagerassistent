[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Vite kraver Node 18+. Netlify defaultar till en aldre version.
  NODE_VERSION = "20"

  # SUPABASE_ANON_KEY och SUPABASE_URL är MEDVETET publika.
  # Anon-key:s syfte är att vara öppen — RLS skyddar data server-side (Fas 1).
  # SUPABASE_SERVICE_ROLE_KEY och CRON_SECRET fortsätter scannas (de är hemliga).
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,SUPABASE_URL"

# Cron-trigger tillfälligt inaktiverad i Fas 1:
# send-weekly kräver nu JWT eller CRON_SECRET-header.
# Netlify scheduled-trigger skickar ingen header, så cron-flöde är brutet.
# Fixas i Fas 6 (flytta schedule till Supabase pg_cron eller GitHub Action
# som kan skicka CRON_SECRET-header).
#
# [[scheduled-functions]]
#   name = "send-weekly"
#   cron = "0 7 * * 1"
